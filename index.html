        .rank-2 { background: linear-gradient(135deg, #f0f0f0, #d9d9d9); color: #595959; }

        .rank-default { background: #f5f5f5; color: #8c8c8c; }

            align-items: center;

            margin-right: 8px;
            border-radius: 2px;

            gap: 8px;
        }

            width: 18px;
            height: 12px;
            object-fit: cover;
            border-radius: 2px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.08);

            color: #1677ff;

        }

            border: 1px solid #f0f0f0;
            border-radius: 4px;
            padding: 1px 8px;

            font-size: 12px;

            gap: 16px;

            margin: 0 !important;

        function getInitialLocale() {
            const queryLocale = new URLSearchParams(window.location.search).get('lang');
            if (SUPPORTED_LOCALES.includes(queryLocale)) return queryLocale;
            const storedLocale = getStoredLocale();
            if (SUPPORTED_LOCALES.includes(storedLocale)) return storedLocale;
            const browserLocale = navigator.language;
            if (SUPPORTED_LOCALES.includes(browserLocale)) return browserLocale;
            if (browserLocale?.startsWith('zh')) return 'zh-CN';
            if (browserLocale?.startsWith('ja')) return 'ja';
            if (browserLocale?.startsWith('ko')) return 'ko';
            return DEFAULT_LOCALE;
        }

        function getStoredLocale() {
            try {
                return localStorage.getItem('locale');
            } catch (error) {
                return null;
            }
        }

        function setStoredLocale(locale) {
            try {
                localStorage.setItem('locale', locale);
            } catch (error) {
                // Storage may be unavailable for local files or strict browser settings.
            }
        }

        const ESCAPE_MAP = {
            "Taiwan, Province of China": "Taiwan, Province of China",
        }
        const FLAG_OVERRIDE_MAP = {
            "TW": "CN",
        }
        function escapeSpecialRegion(region) {
            return ESCAPE_MAP[region] || region
        }

        function resolveFlag(code) {
            return FLAG_OVERRIDE_MAP[code] || code
        }

        function flagUrl(code) {
            return `https://purecatamphetamine.github.io/country-flag-icons/3x2/${resolveFlag(code)}.svg`;
        }

        function CountryOptionLabel({ code, text }) {
            return <span className="country-option">
                {code && <img alt={code} src={flagUrl(code)} />}
                <span>{text}</span>
            </span>
        }

        function GithubIcon(props) {
            return (
                <svg
                {...props}
                xmlns="http://www.w3.org/2000/svg" width="1.2em" height="1.2em" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5c.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34c-.46-1.16-1.11-1.47-1.11-1.47c-.91-.62.07-.6.07-.6c1 .07 1.53 1.03 1.53 1.03c.87 1.52 2.34 1.07 2.91.83c.09-.65.35-1.09.63-1.34c-2.22-.25-4.55-1.11-4.55-4.92c0-1.11.38-2 1.03-2.71c-.1-.25-.45-1.29.1-2.64c0 0 .84-.27 2.75 1.02c.79-.22 1.65-.33 2.5-.33s1.71.11 2.5.33c1.91-1.29 2.75-1.02 2.75-1.02c.55 1.35.2 2.39.1 2.64c.65.71 1.03 1.6 1.03 2.71c0 3.82-2.34 4.66-4.57 4.91c.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2"/>
                </svg>
            )
        }

        function App() {
            const [data, setData] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [meta, setMeta] = React.useState(undefined); // [update, repo, branch, commit]
            const [countryFilter, setCountryFilter] = React.useState('all');
            const [sortBy, setSortBy] = React.useState('rank');
            const [searchText, setSearchText] = React.useState('');
            const [locale, setLocale] = React.useState(getInitialLocale);
            const t = (key) => MESSAGES[locale]?.[key] || MESSAGES[DEFAULT_LOCALE][key] || key;
            const formatNumber = (val) => val?.toLocaleString(locale);
            const formatDate = (val) => val ? new Intl.DateTimeFormat(locale).format(new Date(val)) : t('notAvailable');
            const formatDateTime = (val) => val ? new Intl.DateTimeFormat(locale, {
                dateStyle: 'medium',
                timeStyle: 'short',
            }).format(new Date(val)) : t('notAvailable');
            const applyResultPayload = (payload) => {
                setData(Array.isArray(payload?.data) ? payload.data : [])
                setMeta(payload?.meta)
            }
            const columns = [
                {
                    key: 'rank',
                    title: t('rank'),
                    dataIndex: 'rank',
                    width: 80,
                    render: (rank) => {
                        const cls = rank <= 3 ? `rank-${rank}` : 'rank-default';
                        return <span className={`rank-badge ${cls}`}>{rank}</span>;
                    }
                },
                {
                    key: "name",
                    title: t('university'),
                    dataIndex: "name",
                    render: (text, record) => <a className="university-link" href={`detail/${locale}/${record.id}.html`} target="_blank">{record.name}</a>
                },
                {
                    key: 'domain',
                    title: t('domains'),
                    dataIndex: 'domain',
                    render: (text, record) => <div>
                        {record.domains.map(u => <span className="domain-tag" key={u}>{u}</span>)}
                    </div>
                },
                {
                    key: "country",
                    title: t('countryRegion'),
                    render: (text, record) => <div className="cell-country">
                        {record.university?.alpha_two_code && <img
                            alt={record.university.alpha_two_code}
                            src={flagUrl(record.university.alpha_two_code)} />}
                        {escapeSpecialRegion(record.university?.country || t('unknown'))}
                    </div>
                },
                {
                    key: 'count',
                    title: t('patches'),
                    dataIndex: 'count',
                    width: 100,
                    render: (val) => <span className="stat-value">{formatNumber(val)}</span>
                },
                {
                    key: 'contributor_count',
                    title: t('contributors'),
                    dataIndex: 'contributor_count',
                    width: 120,
                    render: (val) => <span className="stat-value">{formatNumber(val)}</span>
                },
                {
                    key: 'lines',
                    title: t('linesChanged'),
                    dataIndex: 'lines',
                    width: 120,
                    render: (val) => <span className="stat-value">{formatNumber(val)}</span>
                }
            ]
            const expandedRowRender = (record) => {
                const columns = [
                    {title: t('author'), dataIndex: 'name', key: 'author'},
                    {title: t('email'), dataIndex: 'email', key: 'email'},
                    {title: t('patchCount'), dataIndex: 'count', key: 'count'},
                ];

                const secondExpandedRowRender = (items) => {
                    const columns = [
                        {title: t('summary'), dataIndex: 'summary', key: 'summary', render: (text, record) => <a href={"https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git/commit/?id=" + record.commit} target="_blank">{text}</a>},
                        {title: t('date'), dataIndex: 'date', key: 'date', render: formatDate},
                        {title: t('files'), dataIndex: 'files', key: 'files', },
                        {title: t('lines'), dataIndex: 'lines', key: 'lines', }
                    ]

                    return <antd.Table columns={columns} dataSource={items.commits} pagination={false} rowKey="commit" />;
                }

                return <antd.Table columns={columns} dataSource={record.authors} pagination={false} rowKey="email" expandable={{
                    expandedRowRender: secondExpandedRowRender
                }} />;
            }

            React.useEffect(() => {
                setLoading(true);
                if (window.__LINUX_EDU_RANK_RESULT__) {
                    applyResultPayload(window.__LINUX_EDU_RANK_RESULT__)
                    setLoading(false)
                    return
                }
                fetch('result.json')
                    .then(d => d.json())
                    .then(applyResultPayload)
                    .catch(error => {
                        console.error('Failed to load result.json', error)
                        antd.message.error('Failed to load result.json')
                    })
                    .finally(() => {
                        setLoading(false)
                    })
            }, [])

            React.useEffect(() => {
                document.documentElement.lang = locale;
                document.title = t('documentTitle');
                setStoredLocale(locale);
            }, [locale])

            const totalStats = React.useMemo(() => {
                const totalPatches = data.reduce((sum, d) => sum + (d.count || 0), 0);
                const totalContributors = data.reduce((sum, d) => sum + (d.contributor_count || 0), 0);
                return { universities: data.length, patches: totalPatches, contributors: totalContributors };
            }, [data]);

            const countryOptions = React.useMemo(() => {
                const countryStats = new Map();
                for (const item of data) {
                    const country = item.university?.country || UNKNOWN_COUNTRY;
                    const existing = countryStats.get(country) || {
                        code: item.university?.alpha_two_code,
                        patches: 0,
                        universities: 0,
                    };
                    existing.patches += item.count || 0;
                    existing.universities += 1;
                    existing.code = existing.code || item.university?.alpha_two_code;
                    countryStats.set(country, existing);
                }
                const options = Array.from(countryStats.entries())
                    .sort((a, b) => b[1].patches - a[1].patches || a[0].localeCompare(b[0], locale))
                    .map(([country, stats]) => ({
                        value: country,
                        searchLabel: country === UNKNOWN_COUNTRY ? t('unknown') : escapeSpecialRegion(country),
                        label: <CountryOptionLabel
                            code={stats.code}
                            text={`${country === UNKNOWN_COUNTRY ? t('unknown') : escapeSpecialRegion(country)} (${formatNumber(stats.patches)})`}
                        />,
                    }));
                return [{ value: 'all', searchLabel: t('allCountries'), label: t('allCountries') }, ...options];
            }, [data, locale])

            const sortOptions = React.useMemo(() => [
                { value: 'rank', label: t('sortByRank') },
                { value: 'patches', label: t('sortByPatches') },
                { value: 'contributors', label: t('sortByContributors') },
                { value: 'lines', label: t('sortByLines') },
            ], [locale])

            const displayData = React.useMemo(() => {
                const normalizedSearch = searchText.trim().toLowerCase();
                let items = data.filter(item => {
                    const country = item.university?.country || UNKNOWN_COUNTRY;
                    if (countryFilter !== 'all' && country !== countryFilter) return false;
                    if (!normalizedSearch) return true;

                    return [item.name, ...(item.domains || [])]
                        .filter(Boolean)
                        .some(value => value.toLowerCase().includes(normalizedSearch));
                });

                if (sortBy !== 'rank') {
                    const sorters = {
                        patches: item => item.count || 0,
                        contributors: item => item.contributor_count || 0,
                        lines: item => item.lines || 0,
                    };
                    const getValue = sorters[sortBy];
                    items = [...items].sort((a, b) =>
                        getValue(b) - getValue(a) || (a.rank || 0) - (b.rank || 0)
                    );
                }

                return items;
            }, [countryFilter, data, searchText, sortBy, locale])

            const screens = antd.Grid.useBreakpoint();
            const columnMetadata = screens.lg ? 4 : screens.md ? 3 : screens.sm ? 2 : 1;

            return (
                <antd.Spin spinning={loading}>
                    <div className="header">
                        <div className="header-content">
                            <div className="header-actions">
                                <antd.Select
                                    aria-label={t('language')}
                                    className="language-select"
                                    value={locale}
                                    options={SUPPORTED_LOCALES.map(value => ({ value, label: LOCALE_LABELS[value] }))}
                                    onChange={setLocale}
                                />
                                <a className="github-link" href="https://github.com/hust-open-atom-club/linux-edu-rank" target="_blank" rel="noopener noreferrer">
                                    <GithubIcon style={{ width: '28px', height: '28px' }} />
                                </a>
                            </div>
                            <h1>{t('pageTitle')}</h1>
                            <div className="subtitle">{t('subtitle')}</div>
                        </div>
                    </div>

                    <div className="main-content">
                        {meta && (
                            <antd.Card className="meta-card" size="small">
                                <antd.Descriptions column={columnMetadata} size="small">
                                    <antd.Descriptions.Item label={t('lastUpdate')}>{formatDateTime(meta.update)}</antd.Descriptions.Item>
                                    <antd.Descriptions.Item label={t('repository')}>{meta.repo}</antd.Descriptions.Item>
                                    <antd.Descriptions.Item label={t('branch')}>{meta.branch}</antd.Descriptions.Item>
                                    <antd.Descriptions.Item label={t('commit')}>{meta.commit}</antd.Descriptions.Item>
                                </antd.Descriptions>
                            </antd.Card>
                        )}

                        {data.length > 0 && (
                            <div className="stats-row">
                                <antd.Card size="small">
                                    <antd.Statistic title={t('universities')} value={totalStats.universities} formatter={formatNumber} />
                                </antd.Card>
                                <antd.Card size="small">
                                    <antd.Statistic title={t('totalPatches')} value={totalStats.patches} formatter={formatNumber} />
                                </antd.Card>
                                <antd.Card size="small">
                                    <antd.Statistic title={t('totalContributors')} value={totalStats.contributors} formatter={formatNumber} />
                                </antd.Card>
                            </div>
                        )}

                        <antd.Card className="filter-bar" size="small">
                            <div className="filter-controls">
                                <antd.Input.Search
                                    allowClear
                                    placeholder={t('searchUniversity')}
                                    value={searchText}
                                    onChange={(event) => setSearchText(event.target.value)}
                                />
                                <antd.Select
                                    aria-label={t('countryFilter')}
                                    value={countryFilter}
                                    options={countryOptions}
                                    showSearch
                                    optionFilterProp="searchLabel"
                                    onChange={setCountryFilter}
                                />
                                <antd.Select
                                    aria-label={t('sortBy')}
                                    value={sortBy}
                                    options={sortOptions}
                                    onChange={setSortBy}
                                />
                            </div>
                        </antd.Card>

                        <antd.Card className="table-card" bodyStyle={{ padding: 0 }}>
                            <antd.Table
                                dataSource={displayData}
                                columns={columns}
                                pagination={false}
                                expandable={{ expandedRowRender }}
                                rowKey="id"
                                size="middle"
                                scroll={{ x: 800 }}
                            />
                        </antd.Card>
                        <div className="page-footer">
                            <a href="https://github.com/hust-open-atom-club/linux-edu-rank" target="_blank" rel="noopener noreferrer">
                                hust-open-atom-club/linux-edu-rank
                            </a>
                            {' '}&mdash; {t('footerText')}
                        </div>
                    </div>
                </antd.Spin>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
