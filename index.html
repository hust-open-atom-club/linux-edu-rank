<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Kernel Patch Statistic among Universities</title>

    <script src="https://s4.zstatic.net/ajax/libs/react/18.2.0/umd/react.development.min.js" integrity="sha384-2Lh7Q+QSdCvoe0sllT5jFErR9aFIWJHFufzuseDyLsJn9a5m2YqQHhCz0NpGNFIB" crossorigin="anonymous"></script>
    <script src="https://s4.zstatic.net/ajax/libs/react-dom/18.2.0/umd/react-dom.development.min.js" integrity="sha384-UQ4ATYmjYZlBA1kyQlDkeJj4TdyVKTmKtUnyVEDVKvPr7GOISK9tfDyxTIvpDFhc" crossorigin="anonymous"></script>
    <script src="https://s4.zstatic.net/ajax/libs/babel-standalone/7.22.17/babel.min.js" integrity="sha384-E9gF5bp/9ap5fWKPvScT2xn3qYLXBVuViOUYO1AritUY8zlH3ISflL2d7NvJfg/s" crossorigin="anonymous"></script>
    <script src="https://s4.zstatic.net/ajax/libs/dayjs/1.11.9/dayjs.min.js" integrity="sha384-ok2ureoh4h8/yzfhscH9aGBd1IrWT0jPFG7JF7dbo+uFAQCn3jc6nY1AYH5y6hhv" crossorigin="anonymous"></script>

    <script src="https://s4.zstatic.net/ajax/libs/antd/5.9.0/antd.min.js" integrity="sha384-PYHnf42vhdyuGieCUjW1qCt8qpvsUnbRGdHnKnNhdxj0g5P+fljo+JmM4NYV0FDD" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://s4.zstatic.net/ajax/libs/antd/5.9.0/reset.min.css" integrity="sha384-iqyoCPXvqh7OcpFMoeqEPDFuAYAXgbIzXw++z0KY2NBDjkvq0siOCcRIKwu892Ca" crossorigin="anonymous">

</head>

<body>
    <div id="root"></div>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            padding: 48px 32px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 50%, rgba(255,255,255,0.03) 0%, transparent 50%);
        }

        .header-content {
            position: relative;
            max-width: 960px;
            margin: 0 auto;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header .subtitle {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.65);
        }

        .header .github-link {
            position: absolute;
            top: 0;
            right: 0;
            color: rgba(255, 255, 255, 0.7);
            transition: color 0.2s;
        }

        .header .github-link:hover {
            color: #fff;
        }

        .main-content {
            max-width: 1200px;
            margin: -24px auto 40px;
            padding: 0 24px;
            position: relative;
        }

        .meta-card {
            margin-bottom: 20px;
        }

        .meta-card .ant-descriptions-item-label {
            font-weight: 600;
            color: #595959;
        }

        .filter-bar {
            margin-bottom: 20px;
        }

        .table-card .ant-table-thead > tr > th {
            background: #fafafa;
            font-weight: 600;
            color: #262626;
            border-bottom: 2px solid #f0f0f0;
        }

        .table-card .ant-table-tbody > tr:hover > td {
            background: #e6f4ff !important;
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 28px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            padding: 0 8px;
        }

        .rank-1 { background: linear-gradient(135deg, #fff7e6, #ffe7ba); color: #d48806; }
        .rank-2 { background: linear-gradient(135deg, #f0f0f0, #d9d9d9); color: #595959; }
        .rank-3 { background: linear-gradient(135deg, #fff1e6, #ffd8bf); color: #d4380d; }
        .rank-default { background: #f5f5f5; color: #8c8c8c; }

        .cell-country {
            display: inline-flex;
            align-items: center;
        }

        .cell-country img {
            height: 1em;
            margin-right: 8px;
            border-radius: 2px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
        }

        .university-link {
            font-weight: 500;
            color: #1677ff;
        }

        .university-link:hover {
            color: #4096ff;
        }

        .domain-tag {
            display: inline-block;
            background: #f5f5f5;
            border: 1px solid #f0f0f0;
            border-radius: 4px;
            padding: 1px 8px;
            margin: 2px 4px 2px 0;
            font-size: 12px;
            color: #595959;
            font-family: 'SFMono-Regular', Consolas, monospace;
        }

        .stat-value {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        /* Summary stats row */
        .stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .stats-row .ant-card {
            flex: 1;
            text-align: center;
        }

        .stats-row .ant-statistic-title {
            color: #8c8c8c;
            font-size: 13px;
        }

        .stats-row .ant-statistic-content-value {
            color: #1a1a2e;
            font-weight: 700;
        }

        /* Nested / expandable sub-tables */
        .table-card .ant-table-expanded-row > td {
            padding: 0 !important;
        }

        .table-card .ant-table-expanded-row .ant-table {
            margin: 0 !important;
        }

        .table-card .ant-table-expanded-row .ant-table-tbody > tr > td {
            background: #fafbfc;
            font-size: 13px;
            border-left: 3px solid #e6f4ff;
        }

        .table-card .ant-table-expanded-row .ant-table-thead > tr > th {
            background: #f0f5ff;
            font-size: 13px;
            font-weight: 600;
            border-bottom: 1px solid #d6e4ff;
        }

        .table-card .ant-table-expanded-row .ant-table-expanded-row .ant-table-tbody > tr > td {
            border-left-color: #d6e4ff;
            background: #f5f7fa;
        }

        /* Footer */
        .page-footer {
            text-align: center;
            padding: 32px 24px;
            color: #8c8c8c;
            font-size: 13px;
        }

        .page-footer a {
            color: #595959;
            text-decoration: none;
        }

        .page-footer a:hover {
            color: #1677ff;
        }

        @media (max-width: 576px) {
            .header { padding: 32px 16px 28px; }
            .header h1 { font-size: 22px; }
            .main-content { padding: 0 12px; }
            .stats-row { flex-direction: column; }
        }
    </style>

    <script type="text/babel">
        const ESCAPE_MAP = {
            "Taiwan, Province of China": "Taiwan, Province of China",
        }
        const FLAG_OVERRIDE_MAP = {
            "TW": "CN",
        }
        function escapeSpecialRegion(region) {
            return ESCAPE_MAP[region] || region
        }

        function resolveFlag(code) {
            return FLAG_OVERRIDE_MAP[code] || code
        }

        function GithubIcon(props) {
            return (
                <svg
                {...props}
                xmlns="http://www.w3.org/2000/svg" width="1.2em" height="1.2em" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5c.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34c-.46-1.16-1.11-1.47-1.11-1.47c-.91-.62.07-.6.07-.6c1 .07 1.53 1.03 1.53 1.03c.87 1.52 2.34 1.07 2.91.83c.09-.65.35-1.09.63-1.34c-2.22-.25-4.55-1.11-4.55-4.92c0-1.11.38-2 1.03-2.71c-.1-.25-.45-1.29.1-2.64c0 0 .84-.27 2.75 1.02c.79-.22 1.65-.33 2.5-.33s1.71.11 2.5.33c1.91-1.29 2.75-1.02 2.75-1.02c.55 1.35.2 2.39.1 2.64c.65.71 1.03 1.6 1.03 2.71c0 3.82-2.34 4.66-4.57 4.91c.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2"/>
                </svg>
            )
        }

        function App() {
            const [data, setData] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [meta, setMeta] = React.useState(undefined); // [update, repo, branch, commit]
            const [chinaOnly, setChinaOnly] = React.useState(false);
            const columns = [
                {
                    key: 'rank',
                    title: 'Rank',
                    dataIndex: 'rank',
                    width: 80,
                    render: (rank) => {
                        const cls = rank <= 3 ? `rank-${rank}` : 'rank-default';
                        return <span className={`rank-badge ${cls}`}>{rank}</span>;
                    }
                },
                {
                    key: "name",
                    title: "University",
                    dataIndex: "name",
                    render: (text, record) => <a className="university-link" href={`detail/${record.id}.html`} target="_blank">{record.name}</a>
                },
                {
                    key: 'domain',
                    title: 'Domain(s)',
                    dataIndex: 'domain',
                    render: (text, record) => <div>
                        {record.domains.map(u => <span className="domain-tag" key={u}>{u}</span>)}
                    </div>
                },
                {
                    key: "country",
                    title: "Country / Region",
                    render: (text, record) => <div className="cell-country">
                        {record.university?.alpha_two_code && <img
                            alt={record.university.alpha_two_code}
                            src={`http://purecatamphetamine.github.io/country-flag-icons/3x2/${resolveFlag(record.university.alpha_two_code)}.svg`} />}
                        {escapeSpecialRegion(record.university?.country || "Unknown")}
                    </div>
                },
                {
                    key: 'count',
                    title: 'Patches',
                    dataIndex: 'count',
                    width: 100,
                    render: (val) => <span className="stat-value">{val?.toLocaleString()}</span>
                },
                {
                    key: 'contributor_count',
                    title: 'Contributors',
                    dataIndex: 'contributor_count',
                    width: 120,
                    render: (val) => <span className="stat-value">{val?.toLocaleString()}</span>
                },
                {
                    key: 'lines',
                    title: 'Lines Changed',
                    dataIndex: 'lines',
                    width: 120,
                    render: (val) => <span className="stat-value">{val?.toLocaleString()}</span>
                }
            ]
            const expandedRowRender = (record) => {
                const columns = [
                    {title: 'Author', dataIndex: 'name', key: 'author'},
                    {title: 'Email', dataIndex: 'email', key: 'email'},
                    {title: 'Patch Count', dataIndex: 'count', key: 'count'},
                ];

                const secondExpandedRowRender = (items) => {
                    const columns = [
                        {title: 'Summary', dataIndex: 'summary', key: 'summary', render: (text, record) => <a href={"https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git/commit/?id=" + record.commit} target="_blank">{text}</a>},
                        {title: 'Date', dataIndex: 'date', key: 'date', render: (text) => dayjs(text).format('YYYY-MM-DD')},
                        {title: 'Files', dataIndex: 'files', key: 'files', },
                        {title: 'Lines', dataIndex: 'lines', key: 'lines', }
                    ]

                    return <antd.Table columns={columns} dataSource={items.commits} pagination={false} rowKey="commit" />;
                }

                return <antd.Table columns={columns} dataSource={record.authors} pagination={false} rowKey="email" expandable={{
                    expandedRowRender: secondExpandedRowRender
                }} />;
            }

            React.useEffect(() => {
                setLoading(true);
                fetch('result.json')
                    .then(d => d.json())
                    .then(d => {
                        setData(d.data)
                        setMeta(d.meta)
                    })
                    .finally(() => {
                        setLoading(false)
                    })
            }, [])

            const totalStats = React.useMemo(() => {
                const totalPatches = data.reduce((sum, d) => sum + (d.count || 0), 0);
                const totalContributors = data.reduce((sum, d) => sum + (d.contributor_count || 0), 0);
                return { universities: data.length, patches: totalPatches, contributors: totalContributors };
            }, [data]);

            const displayData = React.useMemo(() => {
                if (chinaOnly) {
                    return data.filter(d =>
                        d.university?.alpha_two_code === 'CN' || d.domains?.join("").includes('.cn')
                    )
                }
                return data
            }, [chinaOnly, data])

            const screens = antd.Grid.useBreakpoint();
            const columnMetadata = screens.lg ? 4 : screens.md ? 3 : screens.sm ? 2 : 1;

            return (
                <antd.Spin spinning={loading}>
                    <div className="header">
                        <div className="header-content">
                            <a className="github-link" href="https://github.com/hust-open-atom-club/linux-edu-rank" target="_blank" rel="noopener noreferrer">
                                <GithubIcon style={{ width: '28px', height: '28px' }} />
                            </a>
                            <h1>Linux Kernel Patch Statistics</h1>
                            <div className="subtitle">University contributions to the Linux kernel, ranked by patch count</div>
                        </div>
                    </div>

                    <div className="main-content">
                        {meta && (
                            <antd.Card className="meta-card" size="small">
                                <antd.Descriptions column={columnMetadata} size="small">
                                    <antd.Descriptions.Item label="Last Update">{meta.update ? dayjs(meta.update).format("YYYY-MM-DD HH:mm") : "N/A"}</antd.Descriptions.Item>
                                    <antd.Descriptions.Item label="Repository">{meta.repo}</antd.Descriptions.Item>
                                    <antd.Descriptions.Item label="Branch">{meta.branch}</antd.Descriptions.Item>
                                    <antd.Descriptions.Item label="Commit">{meta.commit}</antd.Descriptions.Item>
                                </antd.Descriptions>
                            </antd.Card>
                        )}

                        {data.length > 0 && (
                            <div className="stats-row">
                                <antd.Card size="small">
                                    <antd.Statistic title="Universities" value={totalStats.universities} />
                                </antd.Card>
                                <antd.Card size="small">
                                    <antd.Statistic title="Total Patches" value={totalStats.patches} />
                                </antd.Card>
                                <antd.Card size="small">
                                    <antd.Statistic title="Total Contributors" value={totalStats.contributors} />
                                </antd.Card>
                            </div>
                        )}

                        <antd.Card className="filter-bar" size="small">
                            <antd.Checkbox checked={chinaOnly} onChange={(e) => {
                                setChinaOnly(e.target.checked)
                            }}>Only show universities in China's mainland</antd.Checkbox>
                        </antd.Card>

                        <antd.Card className="table-card" bodyStyle={{ padding: 0 }}>
                            <antd.Table
                                dataSource={displayData}
                                columns={columns}
                                pagination={false}
                                expandable={{ expandedRowRender }}
                                rowKey="id"
                                size="middle"
                                scroll={{ x: 800 }}
                            />
                        </antd.Card>
                        <div className="page-footer">
                            <a href="https://github.com/hust-open-atom-club/linux-edu-rank" target="_blank" rel="noopener noreferrer">
                                hust-open-atom-club/linux-edu-rank
                            </a>
                            {' '}&mdash; Tracking university contributions to the Linux kernel
                        </div>
                    </div>
                </antd.Spin>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
